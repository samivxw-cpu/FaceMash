<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaceMash</title>
  <meta name="description" content="FaceMash est une plateforme interactive où les utilisateurs comparent deux célébrités et choisissent celle qu’ils trouvent la plus belle ou la plus charismatique. Classement dynamique basé sur le Elo Rating System.">
  <meta name="keywords" content="FaceMash, celebrity voting, Elo ranking, face comparison, continents">
  <meta property="og:title" content="FaceMash">
  <meta property="og:description" content="Compare celebrities, vote, and watch live rankings by continent.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="logo.svg">
  <meta property="og:url" content="https://samivxw-cpu.github.io/FaceMash/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FaceMash">
  <meta name="twitter:description" content="Compare celebrities and rank them live with Elo.">
  <meta name="twitter:image" content="logo.svg">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="apple-touch-icon" href="logo.svg">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="FaceMash home">
      <img src="logo.svg" alt="FaceMash logo" class="logo" width="44" height="44">
      <span>FaceMash</span>
    </a>
  </header>

  <main class="page">
    <section class="hero">
      <h1>Who is hotter? Click to vote.</h1>
      <p class="subline" id="questionLine">Who is more handsome, left or right?</p>

      <div class="mode-switch">
        <button type="button" id="modeMale" onclick="setGender('male')">Men</button>
        <button type="button" id="modeFemale" onclick="setGender('female')">Women</button>
      </div>

      <div class="continent-switch" id="continentTabs" aria-label="continent tabs"></div>

      <div class="view-switch">
        <button type="button" id="tabBattle" onclick="setView('battle')">Battle</button>
        <button type="button" id="tabRanking" onclick="setView('ranking')">Ranking</button>
      </div>

      <p id="status" class="status"></p>
    </section>

    <section id="battleView">
      <section class="battle" id="battle">
        <article class="face-card" onclick="vote('left')">
          <img id="imgLeft" alt="Left profile" loading="lazy">
          <h2 id="nameLeft"></h2>
        </article>

        <div class="versus">OR</div>

        <article class="face-card" onclick="vote('right')">
          <img id="imgRight" alt="Right profile" loading="lazy">
          <h2 id="nameRight"></h2>
        </article>
      </section>

      <section class="rankings top10-only">
        <article class="ranking-panel">
          <h3 id="maleTopTitle">Top 10 Men</h3>
          <ol id="rankingMaleTop"></ol>
        </article>

        <article class="ranking-panel">
          <h3 id="femaleTopTitle">Top 10 Women</h3>
          <ol id="rankingFemaleTop"></ol>
        </article>
      </section>

      <section class="gallery-wrap">
        <div class="gallery-head">
          <h3 id="galleryTitle">Living Celebrities</h3>
          <p id="galleryCount"></p>
        </div>
        <div id="gallery" class="gallery"></div>
        <button type="button" id="loadMoreBtn" class="load-more" onclick="loadMoreGallery()">Load more</button>
      </section>
    </section>

    <section id="rankingView" class="hidden">
      <section class="rankings full-rankings">
        <article class="ranking-panel">
          <h3 id="maleRankingTitle">Men Ranking</h3>
          <ol id="rankingMaleFull"></ol>
        </article>

        <article class="ranking-panel">
          <h3 id="femaleRankingTitle">Women Ranking</h3>
          <ol id="rankingFemaleFull"></ol>
        </article>
      </section>
    </section>
  </main>

  <footer class="site-footer">
    <p><strong>Sami Benabdelmalek</strong> • Created in 2026</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>

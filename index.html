<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaceSmash.com</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">FaceSmash.com</div>
    <nav class="topnav">
      <a href="index.html" class="active">Accueil</a>
      <a href="author.html">Auteur</a>
    </nav>
  </header>

  <main class="page">
    <section class="hero">
      <h1>Who is hotter? Clique pour voter.</h1>
      <p>Comparaison stricte par genre: Homme vs Homme, Femme vs Femme.</p>
      <div class="mode-switch">
        <button type="button" id="modeFemale" onclick="setGender('female')">Femmes</button>
        <button type="button" id="modeMale" onclick="setGender('male')">Hommes</button>
      </div>
      <p id="status" class="status"></p>
    </section>

    <section class="battle" id="battle">
      <article class="face-card" onclick="vote('left')">
        <img id="imgLeft" alt="Portrait 1" loading="lazy">
        <h2 id="nameLeft"></h2>
      </article>

      <div class="versus">OR</div>

      <article class="face-card" onclick="vote('right')">
        <img id="imgRight" alt="Portrait 2" loading="lazy">
        <h2 id="nameRight"></h2>
      </article>
    </section>

    <section class="rankings">
      <article class="ranking-panel">
        <h3>Classement Femmes</h3>
        <ol id="rankingFemale"></ol>
      </article>
      <article class="ranking-panel">
        <h3>Classement Hommes</h3>
        <ol id="rankingMale"></ol>
      </article>
    </section>

    <section class="gallery-wrap">
      <div class="gallery-head">
        <h3>Base celebrites (10 000 profils)</h3>
        <p id="galleryCount"></p>
      </div>
      <div id="gallery" class="gallery"></div>
      <button type="button" id="loadMoreBtn" class="load-more" onclick="loadMoreGallery()">Charger plus</button>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaceMash - World Map</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg?v=20260308c">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap/dist/css/jsvectormap.min.css?v=20260308c">
  <link rel="stylesheet" href="style.css?v=20260308c">
</head>
<body data-page="map">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html" aria-label="FaceMash home">
        <img src="logo.svg?v=20260308c" alt="FaceMash logo" class="logo" width="40" height="40">
        <span>FaceMash</span>
      </a>
      <nav class="header-tabs" aria-label="Main navigation">
        <a class="tab-link" href="battle.html">Battle</a>
        <a class="tab-link" href="ranking.html">Ranking</a>
        <a class="tab-link active-link" href="map.html">Map</a>
        <a class="tab-link" href="account.html">Create account</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <h1>Global FaceMap</h1>
      <p class="subline">Click any country and see its top profile instantly.</p>
      <div class="filter-tabs" role="tablist" aria-label="Gender tabs">
        <button type="button" id="modeMale" class="chip-btn" onclick="setGender('male')">Men</button>
        <button type="button" id="modeFemale" class="chip-btn" onclick="setGender('female')">Women</button>
      </div>
      <p id="status" class="status"></p>
    </section>

    <section class="map-wrap">
      <div id="worldMap" class="world-map" aria-label="World map"></div>
      <article id="countrySpotlight" class="country-spotlight">
        <p>Select a country on the map.</p>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>FaceMash</span>
      <a href="cookies.html">Cookies & Legal</a>
      <a href="authors.html">Authors</a>
      <span>Created in 2026</span>
    </div>
  </footer>

  <div id="cookie-banner" class="cookie-banner hidden">
    This site uses cookies to improve your experience.
    <button onclick="acceptCookies()">Accept</button>
    <button onclick="rejectCookies()">Reject</button>
    <a href="cookies.html">Learn more</a>
  </div>

  <script src="script.js?v=20260308c" defer></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaceMash - Ranking</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg?v=20260308a">
  <link rel="stylesheet" href="style.css?v=20260308a">
</head>
<body data-page="ranking">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html" aria-label="FaceMash home">
        <img src="logo.svg?v=20260308a" alt="FaceMash logo" class="logo" width="40" height="40">
        <span>FaceMash</span>
      </a>
      <nav class="header-tabs" aria-label="Main navigation">
        <a class="tab-link" href="battle.html">Battle</a>
        <a class="tab-link active-link" href="ranking.html">Ranking</a>
        <a class="tab-link" href="map.html">Map</a>
        <a class="tab-link" href="account.html">Create account</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <h1>Global Ranking</h1>
      <p class="subline">Browse rankings by continent and gender.</p>
      <div class="filter-tabs" role="tablist" aria-label="Gender tabs">
        <button type="button" id="modeMale" class="chip-btn" onclick="setGender('male')">Men</button>
        <button type="button" id="modeFemale" class="chip-btn" onclick="setGender('female')">Women</button>
      </div>
      <div class="filter-tabs" id="continentTabs" role="tablist" aria-label="Continent tabs"></div>
      <p id="status" class="status"></p>
    </section>

    <section class="champion-strip">
      <article id="maleChampion" class="champion-card">
        <h3>#1 Men</h3>
        <div class="champion-body"></div>
      </article>
      <article id="femaleChampion" class="champion-card">
        <h3>#1 Women</h3>
        <div class="champion-body"></div>
      </article>
    </section>

    <section class="rankings">
      <article class="ranking-panel">
        <h3 id="maleRankingTitle">World Men Ranking</h3>
        <ol id="rankingMaleFull"></ol>
      </article>
      <article class="ranking-panel">
        <h3 id="femaleRankingTitle">World Women Ranking</h3>
        <ol id="rankingFemaleFull"></ol>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>FaceMash</span>
      <a href="cookies.html">Cookies & Legal</a>
      <a href="authors.html">Authors</a>
      <span>Created in 2026</span>
    </div>
  </footer>

  <div id="cookie-banner" class="cookie-banner hidden">
    This site uses cookies to improve your experience.
    <button onclick="acceptCookies()">Accept</button>
    <button onclick="rejectCookies()">Reject</button>
    <a href="cookies.html">Learn more</a>
  </div>

  <script src="script.js?v=20260308a" defer></script>
</body>
</html>

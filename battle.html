<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaceMash - Battle</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg?v=20260308c">
  <link rel="stylesheet" href="style.css?v=20260308c">
</head>
<body data-page="battle">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html" aria-label="FaceMash home">
        <img src="logo.svg?v=20260308c" alt="FaceMash logo" class="logo" width="40" height="40">
        <span>FaceMash</span>
      </a>
      <nav class="header-tabs" aria-label="Main navigation">
        <a class="tab-link active-link" href="battle.html">Battle</a>
        <a class="tab-link" href="ranking.html">Ranking</a>
        <a class="tab-link" href="map.html">Map</a>
        <a class="tab-link" href="account.html">Create account</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <h1>Pick the better profile</h1>
      <p class="subline" id="questionLine">Who looks better, left or right?</p>
      <div class="filter-tabs" role="tablist" aria-label="Gender tabs">
        <button type="button" id="modeMale" class="chip-btn" onclick="setGender('male')">Men</button>
        <button type="button" id="modeFemale" class="chip-btn" onclick="setGender('female')">Women</button>
      </div>
      <div class="filter-tabs" id="continentTabs" role="tablist" aria-label="Continent tabs"></div>
      <p id="status" class="status"></p>
    </section>

    <section class="battle" id="battle">
      <article class="face-card" onclick="vote('left')">
        <img id="imgLeft" alt="Left profile" loading="lazy">
        <h2 id="nameLeft">-</h2>
        <p id="countryLeft" class="country-line"></p>
      </article>
      <div class="versus">OR</div>
      <article class="face-card" onclick="vote('right')">
        <img id="imgRight" alt="Right profile" loading="lazy">
        <h2 id="nameRight">-</h2>
        <p id="countryRight" class="country-line"></p>
      </article>
    </section>

    <section class="rankings">
      <article class="ranking-panel">
        <h3 id="maleTopTitle">Top 10 Men</h3>
        <ol id="rankingMaleTop"></ol>
      </article>
      <article class="ranking-panel">
        <h3 id="femaleTopTitle">Top 10 Women</h3>
        <ol id="rankingFemaleTop"></ol>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>FaceMash</span>
      <a href="cookies.html">Cookies & Legal</a>
      <a href="authors.html">Authors</a>
      <span>Created in 2026</span>
    </div>
  </footer>

  <div id="cookie-banner" class="cookie-banner hidden">
    This site uses cookies to improve your experience.
    <button onclick="acceptCookies()">Accept</button>
    <button onclick="rejectCookies()">Reject</button>
    <a href="cookies.html">Learn more</a>
  </div>

  <script src="script.js?v=20260308c" defer></script>
</body>
</html>
